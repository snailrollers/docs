name: Check

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Mintlify check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g mintlify
      - run: mintlify broken-links
